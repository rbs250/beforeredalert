<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080d">
<title>SIGINT — Live Alert Feed</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◉</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080d;--s1:#0c0c14;--s2:#111119;--s3:#17171f;--s4:#1d1d28;
  --red:#ef3340;--red2:#ff4d58;--amb:#f0a030;--grn:#10d870;--blu:#4094ff;
  --tx:#c8c8d8;--tx2:#808098;--tx3:#484860;--tx4:#2c2c3c;
  --brd:#181824;--brd2:#222234;
  --glass:rgba(12,12,20,.72);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Heebo',sans-serif}
.mono{font-family:'DM Mono',monospace}

/* ═══ LAYOUT ═══ */
.shell{display:grid;grid-template-rows:48px 1fr;grid-template-columns:1fr 400px;height:100vh;height:100dvh}
.hdr{grid-column:1/-1}
.map-wrap{position:relative;overflow:hidden}
.side{background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column}

/* ═══ HEADER ═══ */
.hdr{
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--brd);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;z-index:200;
}
.hdr-r{display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{
  width:28px;height:28px;border-radius:6px;background:var(--red);
  display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px;
  box-shadow:0 0 16px rgba(239,51,64,.3),inset 0 1px 0 rgba(255,255,255,.1);
}
.logo-txt{font-size:14px;font-weight:800;letter-spacing:1px;color:#fff}
.logo-sub{font-size:9px;color:var(--tx3);letter-spacing:.5px;margin-right:8px}
.hdr-l{display:flex;align-items:center;gap:8px}
.clk{font-size:12px;color:var(--tx3);direction:ltr;letter-spacing:.5px}

.pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;letter-spacing:1px;
  border:1px solid var(--brd);
}
.pill.live{border-color:rgba(16,216,112,.25);color:var(--grn)}
.pill.live .dot{width:5px;height:5px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:blink 1.5s ease-in-out infinite}
.pill.err{border-color:rgba(239,51,64,.2);color:var(--red)}
.pill.err .dot{background:var(--red);box-shadow:0 0 6px var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.ibtn{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);
  background:transparent;color:var(--tx3);cursor:pointer;font-size:12px;
  display:grid;place-items:center;transition:.2s;
}
.ibtn:hover{border-color:var(--tx3);color:var(--tx)}
.ibtn.on{border-color:var(--grn);color:var(--grn)}

/* ═══ MAP ═══ */
#map{width:100%;height:100%;background:#080810}
.leaflet-tile-pane{filter:saturate(.25) brightness(.75) contrast(1.2) hue-rotate(200deg)}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.leaflet-popup-content-wrapper{background:var(--s2)!important;color:var(--tx)!important;border:1px solid var(--brd2)!important;border-radius:10px!important;box-shadow:0 12px 40px rgba(0,0,0,.6)!important;font-family:'Heebo',sans-serif!important}
.leaflet-popup-tip{background:var(--s2)!important}
.leaflet-popup-close-button{color:var(--tx3)!important;font-size:16px!important}

/* HUD */
.hud{position:absolute;z-index:1000;pointer-events:none}
.hud>*{pointer-events:auto}
.hud-tr{top:12px;right:12px;display:flex;gap:6px}
.hud-tl{top:12px;left:12px}
.hud-bc{bottom:12px;left:50%;transform:translateX(-50%)}

.chip{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--brd);border-radius:8px;padding:6px 12px;
  font-size:10px;display:flex;align-items:center;gap:5px;
}
.chip .cd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chip-w{background:rgba(240,160,48,.06);border-color:rgba(240,160,48,.15);color:var(--amb);font-size:10px;white-space:nowrap}

.map-rt{
  background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--brd);
  border-radius:8px;padding:6px 12px;font-size:10px;color:var(--tx3);
  display:flex;align-items:center;gap:6px;
}
.map-rt .rd{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.2s ease-in-out infinite}

@keyframes ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(4);opacity:0}}
@keyframes core{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.8}}

/* ═══ SIDE ═══ */
.side-hdr{
  padding:12px 14px;border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.side-title{font-size:12px;font-weight:700;color:var(--tx2);letter-spacing:.3px}
.bdg{background:var(--s3);border-radius:4px;padding:1px 7px;font-size:10px;color:var(--tx3)}

.ftrs{
  padding:8px 14px;border-bottom:1px solid var(--brd);
  display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;
}
.ft{
  padding:4px 10px;border-radius:6px;font-size:10.5px;font-weight:500;
  border:1px solid var(--brd);background:transparent;color:var(--tx3);
  cursor:pointer;transition:.2s;letter-spacing:.2px;
}
.ft:hover{border-color:var(--tx3);color:var(--tx2)}
.ft.on{color:var(--tx);background:var(--s3);border-color:var(--brd2)}
.ft.f-crit.on{color:var(--red);border-color:rgba(239,51,64,.3);background:rgba(239,51,64,.06)}
.ft.f-warn.on{color:var(--amb);border-color:rgba(240,160,48,.3);background:rgba(240,160,48,.06)}
.ft.f-info.on{color:var(--blu);border-color:rgba(64,148,255,.3);background:rgba(64,148,255,.06)}
.ft-sep{width:1px;background:var(--brd);align-self:stretch;margin:0 2px}

/* ═══ FEED ═══ */
.feed{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;scroll-behavior:smooth}
.feed::-webkit-scrollbar{width:3px}
.feed::-webkit-scrollbar-track{background:transparent}
.feed::-webkit-scrollbar-thumb{background:var(--tx4);border-radius:2px}

/* ─── Card base ─── */
.card{
  border:1px solid var(--brd);border-radius:10px;
  margin-bottom:5px;overflow:hidden;transition:.2s;
  background:var(--s2);animation:cardIn .25s ease-out;
}
.card:hover{border-color:var(--brd2);background:var(--s3)}
@keyframes cardIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ─── Critical card — STANDS OUT ─── */
.card.critical{
  border-color:rgba(239,51,64,.25);
  background:linear-gradient(90deg,rgba(239,51,64,.06) 0%,var(--s2) 40%);
  box-shadow:inset 3px 0 12px -4px rgba(239,51,64,.2);
}
.card.critical:hover{border-color:rgba(239,51,64,.4)}
.card.critical .card-txt{font-weight:500;color:#e0e0f0}

/* ─── Warning card ─── */
.card.warning{border-color:rgba(240,160,48,.15)}
.card.warning:hover{border-color:rgba(240,160,48,.3)}

/* ─── Info card ─── */
.card.info{border-color:rgba(64,148,255,.12)}

.card-in{display:flex}
.stripe{width:3px;flex-shrink:0}
.card.critical .stripe{background:var(--red);box-shadow:0 0 8px var(--red)}
.card.warning .stripe{background:var(--amb)}
.card.info .stripe{background:var(--blu)}
.card.clear .stripe{background:var(--grn)}
.card.default .stripe{background:var(--tx4)}

.card-body{padding:10px 12px;flex:1;min-width:0}
.card-txt{font-size:13px;line-height:1.65;word-break:break-word;color:var(--tx)}
.card-txt a{color:var(--blu);text-decoration:none}

.card-foot{
  margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  font-size:9px;color:var(--tx4);direction:ltr;
}
.sv{padding:2px 6px;border-radius:4px;font-weight:600;font-size:8.5px;letter-spacing:.3px;text-transform:uppercase}
.sv.critical{background:rgba(239,51,64,.12);color:var(--red2)}
.sv.warning{background:rgba(240,160,48,.08);color:var(--amb)}
.sv.info{background:rgba(64,148,255,.08);color:var(--blu)}
.sv.clear{background:rgba(16,216,112,.08);color:var(--grn)}
.loc{color:var(--tx3)}
.ago{color:var(--tx4)}

/* Flash on new */
.card.flash{animation:flash 1.2s ease-out}
@keyframes flash{
  0%{background:rgba(239,51,64,.15);border-color:rgba(239,51,64,.5);transform:scale(1.003)}
  100%{background:var(--s2);transform:scale(1)}
}
.card.critical.flash{
  animation:flash-crit 1.5s ease-out;
}
@keyframes flash-crit{
  0%{background:rgba(239,51,64,.25);border-color:rgba(239,51,64,.6);box-shadow:0 0 20px rgba(239,51,64,.3)}
  100%{background:linear-gradient(90deg,rgba(239,51,64,.06) 0%,var(--s2) 40%);box-shadow:inset 3px 0 12px -4px rgba(239,51,64,.2)}
}

.empty{text-align:center;padding:48px 20px;color:var(--tx3);font-size:13px}
.spin{width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--red);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ═══ MOBILE ═══ */
@media(max-width:860px){
  .shell{grid-template-columns:1fr;grid-template-rows:48px 38vh 1fr}
  .map-wrap{grid-row:2}.side{grid-row:3;border-right:none;border-top:1px solid var(--brd)}
  .hdr{padding:0 12px}.logo-txt{font-size:12px}.logo-sub{display:none}
  .feed{padding:4px 6px}.ftrs{padding:6px 8px}.clk{display:none}
}
</style>
</head>
<body>

<div class="shell">

<header class="hdr">
  <div class="hdr-r">
    <div class="logo">
      <div class="logo-mark mono">SIG</div>
      <span class="logo-txt">SIGINT</span>
      <span class="logo-sub mono">BEFORE RED ALERT</span>
    </div>
  </div>
  <div class="hdr-l">
    <span class="clk mono" id="clk"></span>
    <button class="ibtn" id="snd" title="Sound">🔇</button>
    <div class="pill live mono" id="pill"><span class="dot"></span><span id="ptxt">INIT</span></div>
  </div>
</header>

<div class="map-wrap">
  <div id="map"></div>
  <div class="hud hud-tl"><div class="map-rt"><span class="rd"></span><span class="mono">REALTIME &lt;30 MIN</span></div></div>
  <div class="hud hud-tr">
    <div class="chip mono"><span class="cd" style="background:var(--red)"></span><span id="sc">0</span></div>
    <div class="chip mono"><span class="cd" style="background:var(--amb)"></span><span id="sw">0</span></div>
    <div class="chip mono"><span class="cd" style="background:var(--grn)"></span><span id="ut">--:--</span></div>
  </div>
  <div class="hud hud-bc"><div class="chip chip-w">⚠ לא רשמי — פעלו לפי פיקוד העורף</div></div>
</div>

<div class="side">
  <div class="side-hdr">
    <span class="side-title">FEED</span>
    <span class="bdg mono" id="fc">0</span>
  </div>
  <div class="ftrs" id="ftrs">
    <button class="ft on" data-f="all">הכל</button>
    <button class="ft f-crit" data-f="critical">שיגורים</button>
    <button class="ft f-warn" data-f="warning">אזהרות</button>
    <button class="ft f-info" data-f="info">יירוטים</button>
    <div class="ft-sep"></div>
    <button class="ft" data-r="צפון">צפון</button>
    <button class="ft" data-r="מרכז">מרכז</button>
    <button class="ft" data-r="דרום">דרום</button>
    <button class="ft" data-r="ירושלים">י-ם</button>
  </div>
  <div class="feed" id="feed"><div class="empty"><div class="spin"></div>מתחבר...</div></div>
</div>

</div>

<script>
let all=[],known=new Set(),first=true,fSev='all',fReg=null,mks=[],sndOn=false,actx=null;
const MAX_AGE=30;

// ═══ MAP — tighter on Israel ═══
const map=L.map('map',{center:[31.8,34.95],zoom:8.5,zoomControl:false,attributionControl:false,zoomSnap:0.1});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:18,pane:'overlayPane'}).addTo(map);

function mkIcon(sev,age){
  const c={critical:'#ef3340',warning:'#f0a030',info:'#4094ff',clear:'#10d870',default:'#484860'}[sev]||'#484860';
  const op=Math.max(.35,1-(age/MAX_AGE)*.65).toFixed(2);
  const sz=sev==='critical'?28:sev==='warning'?20:16;
  const r=sz/2;
  return L.divIcon({className:'',iconSize:[sz,sz],iconAnchor:[r,r],
    html:`<div style="opacity:${op};position:relative;width:${sz}px;height:${sz}px">
      <div style="position:absolute;inset:0;background:${c};border-radius:50%;opacity:.22;animation:ring 2.2s ease-out infinite"></div>
      ${sev==='critical'?`<div style="position:absolute;inset:-6px;background:${c};border-radius:50%;opacity:.1;animation:ring 2.2s ease-out .5s infinite"></div>`:''}
      <div style="position:absolute;top:${sz*.25}px;left:${sz*.25}px;width:${sz*.5}px;height:${sz*.5}px;background:${c};border-radius:50%;box-shadow:0 0 10px ${c},0 0 20px ${c}30;animation:core 2s ease-in-out infinite"></div>
    </div>`
  });
}

function updateMap(alerts){
  mks.forEach(m=>map.removeLayer(m));mks=[];
  const seen=new Set();
  const recent=alerts.filter(a=>(a.age||999)<MAX_AGE);
  for(const a of recent){
    if(!a.locations)continue;
    for(const loc of a.locations){
      const k=`${loc.lat},${loc.lng}`;
      if(seen.has(k))continue;seen.add(k);
      const m=L.marker([loc.lat,loc.lng],{icon:mkIcon(a.severity,a.age||0)})
        .bindPopup(`<div dir="rtl" style="font-family:Heebo;font-size:12px;max-width:200px;line-height:1.5;padding:2px">${a.text.substring(0,140)}${a.text.length>140?'…':''}<br><span style="color:#808098;font-size:10px">${fmtAgo(a.age)}</span></div>`)
        .addTo(map);
      mks.push(m);
    }
  }
}

// ═══ SOUND ═══
function beep(){
  if(!sndOn)return;
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);o.type='sine';
  o.frequency.setValueAtTime(1200,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,actx.currentTime+.15);
  o.frequency.exponentialRampToValueAtTime(1200,actx.currentTime+.3);
  g.gain.setValueAtTime(.1,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.35);
  o.start();o.stop(actx.currentTime+.35);
}
document.getElementById('snd').onclick=()=>{
  sndOn=!sndOn;const b=document.getElementById('snd');
  b.textContent=sndOn?'🔊':'🔇';b.classList.toggle('on',sndOn);
  if(sndOn){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();actx.resume()}
};

// ═══ CLOCK ═══
const tick=()=>document.getElementById('clk').textContent=
  new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZone:'Asia/Jerusalem'});
tick();setInterval(tick,1000);

// ═══ FILTERS ═══
document.getElementById('ftrs').onclick=e=>{
  const b=e.target.closest('.ft');if(!b)return;
  if(b.dataset.f){
    document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');fSev=b.dataset.f;fReg=null;
    document.querySelectorAll('[data-r]').forEach(x=>x.classList.remove('on'));
  }else if(b.dataset.r){
    const was=b.classList.contains('on');
    document.querySelectorAll('[data-r]').forEach(x=>x.classList.remove('on'));
    fReg=was?null:b.dataset.r;if(!was)b.classList.add('on');
  }
  render();
};

// ═══ HELPERS ═══
function fmtAgo(m){
  if(m==null||m>999)return '';
  if(m<1)return 'עכשיו';
  if(m<60)return `לפני ${m} דק׳`;
  return `לפני ${Math.floor(m/60)} שע׳`;
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function getF(){
  return all.filter(a=>{
    if(fSev!=='all'&&a.severity!==fSev)return false;
    if(fReg&&a.region!==fReg)return false;
    return true;
  });
}

// ═══ RENDER ═══
let prevTop=null;

function render(){
  const fd=document.getElementById('feed'),show=getF();
  document.getElementById('fc').textContent=show.length;
  if(!show.length){fd.innerHTML='<div class="empty">אין התרעות</div>';return}

  let hasNew=false;
  let h='';
  for(const a of show){
    const isNew=!first&&!known.has(a.id);
    if(isNew){hasNew=true;if(a.severity==='critical')beep()}
    const t=a.datetime?new Date(a.datetime).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Jerusalem'}):'';
    const sl={critical:'שיגור',warning:'אזהרה',info:'יירוט',clear:'שגרה'}[a.severity]||'';
    const locs=(a.locations||[]).map(l=>l.name).join(', ');
    const ago=fmtAgo(a.age);

    h+=`<div class="card ${a.severity} ${isNew?'flash':''}"><div class="card-in">
      <div class="stripe"></div>
      <div class="card-body">
        <div class="card-txt">${a.html||esc(a.text)}</div>
        <div class="card-foot mono">
          ${sl?`<span class="sv ${a.severity}">${sl}</span>`:''}
          ${locs?`<span class="loc">📍 ${locs}</span>`:''}
          <span>${t}</span>
          ${ago?`<span class="ago">${ago}</span>`:''}
        </div>
      </div>
    </div></div>`;
  }
  fd.innerHTML=h;

  // Auto-scroll to top on new alerts
  if(hasNew) fd.scrollTo({top:0,behavior:'smooth'});
}

function process(alerts){
  if(!alerts?.length)return;
  all=alerts;
  let c=0,w=0;
  alerts.forEach(a=>{if(a.severity==='critical')c++;if(a.severity==='warning')w++});
  document.getElementById('sc').textContent=c;
  document.getElementById('sw').textContent=w;
  updateMap(getF());
  render();
  known=new Set(alerts.map(a=>a.id));
  first=false;
}

// ═══ SSE ═══
function connect(){
  const es=new EventSource('/api/stream');
  const pill=document.getElementById('pill'),pt=document.getElementById('ptxt');
  es.onopen=()=>{pill.className='pill live mono';pt.textContent='LIVE'};
  es.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.alerts)process(d.alerts);
      if(d.lastUpdate)document.getElementById('ut').textContent=
        new Date(d.lastUpdate).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Jerusalem'});
      if(d.status==='live'){pill.className='pill live mono';pt.textContent='LIVE'}
      if(d.status==='error'){pill.className='pill err mono';pt.textContent='ERR'}
    }catch(x){}
  };
  es.onerror=()=>{pill.className='pill err mono';pt.textContent='RETRY';es.close();setTimeout(connect,4000)};
}
connect();
</script>
</body>
</html>
